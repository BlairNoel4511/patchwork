port: 8080

routes:
  # Basic JSON response
  - path: /api/health
    method: GET
    status: 200
    headers:
      Content-Type: application/json
    body: '{"status": "ok"}'

  # Response with delay simulation
  - path: /api/slow
    method: GET
    delay: 500ms
    status: 200
    body: '{"message": "slow response"}'

  # Multiple responses — sequential mode
  - path: /api/counter
    method: GET
    response_mode: sequential
    responses:
      - status: 200
        body: '{"count": 1}'
      - status: 200
        body: '{"count": 2}'
      - status: 200
        body: '{"count": 3}'

  # Scenario-based responses
  # Activate via: POST /_patchwork/scenario?key=/api/orders&scenario=error
  - path: /api/orders
    method: GET
    response_mode: scenario
    scenario_key: /api/orders
    responses:
      - scenario: ""
        status: 200
        headers:
          Content-Type: application/json
        body: '{"orders": [{"id": 1}]}'
      - scenario: "error"
        status: 503
        headers:
          Content-Type: application/json
        body: '{"error": "service unavailable"}'
      - scenario: "empty"
        status: 200
        headers:
          Content-Type: application/json
        body: '{"orders": []}'

  # Chaos — randomly fail 30% of the time
  - path: /api/unstable
    method: GET
    status: 200
    body: '{"ok": true}'
    chaos:
      error_rate: 0.3
      status: 502
      body: '{"error": "chaos"}'

  # Template response using query params
  - path: /api/greet
    method: GET
    status: 200
    body: '{"message": "Hello, {{queryParam "name"}}!"}'

  # Conditional response based on request header
  - path: /api/secure
    method: GET
    responses:
      - condition:
          header:
            Authorization: Bearer secret-token
        status: 200
        body: '{"data": "secret"}'
      - status: 401
        body: '{"error": "unauthorized"}'

port: 8080

routes:
  - path: /health
    method: GET
    status: 200
    body: '{"status": "ok"}'
    headers:
      Content-Type: application/json

  - path: /users
    method: GET
    status: 200
    body: '[{"id": 1, "name": "Alice"}, {"id": 2, "name": "Bob"}]'
    headers:
      Content-Type: application/json

  - path: /users
    method: POST
    status: 201
    body: '{"id": 3, "name": "Charlie"}'
    headers:
      Content-Type: application/json
    delay_ms: 200

  - path: /slow
    method: GET
    status: 200
    body: '{"message": "this was slow"}'
    headers:
      Content-Type: application/json
    delay_ms: 1500

  - path: /error
    method: GET
    status: 500
    body: '{"error": "internal server error"}'
    headers:
      Content-Type: application/json
